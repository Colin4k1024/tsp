name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (skip actual publish)'
        required: false
        default: 'false'

permissions:
  id-token: write
  contents: read

jobs:
  build-prebuilt:
    name: Build ${{ matrix.platform }} bridge
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
            platform: darwin-arm64
            use_cross: false
          - target: x86_64-apple-darwin
            runner: macos-15-intel
            platform: darwin-x64
            use_cross: false
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            platform: linux-x64
            use_cross: true
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            platform: linux-arm64
            use_cross: true
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            platform: win32-x64
            use_cross: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux targets only)
        if: matrix.use_cross == true
        shell: bash
        run: cargo install cross --locked

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ matrix.target }}-cargo-${{ hashFiles('crates/oris-claude-bridge/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.target }}-cargo-

      - name: Build bridge (native)
        if: matrix.use_cross == false
        shell: bash
        working-directory: crates/oris-claude-bridge
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build bridge (cross)
        if: matrix.use_cross == true
        shell: bash
        working-directory: crates/oris-claude-bridge
        env:
          CROSS_NO_WARNINGS: '1'
          LIBSQLITE3_SYS_USE_PKG_CONFIG: '0'
        run: cross build --release --target ${{ matrix.target }}

      - name: Collect binary (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist/${{ matrix.platform }}
          cp crates/oris-claude-bridge/target/${{ matrix.target }}/release/oris-claude-bridge \
             dist/${{ matrix.platform }}/oris-claude-bridge
          chmod 755 dist/${{ matrix.platform }}/oris-claude-bridge

      - name: Collect binary (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p dist/${{ matrix.platform }}
          cp crates/oris-claude-bridge/target/${{ matrix.target }}/release/oris-claude-bridge.exe \
             dist/${{ matrix.platform }}/oris-claude-bridge.exe

      - name: Upload prebuilt artifact
        uses: actions/upload-artifact@v4
        with:
          name: prebuilt-${{ matrix.platform }}
          path: dist/${{ matrix.platform }}/
          if-no-files-found: error
          retention-days: 1

  publish:
    runs-on: ubuntu-latest
    needs: build-prebuilt

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download prebuilt artifacts
        uses: actions/download-artifact@v4
        with:
          path: _prebuilt_staging

      - name: Stage prebuilt binaries
        shell: bash
        run: |
          set -euo pipefail
          rm -rf bin/prebuilt
          mkdir -p bin/prebuilt
          for artifact_dir in _prebuilt_staging/prebuilt-*/; do
            platform="${artifact_dir#_prebuilt_staging/prebuilt-}"
            platform="${platform%/}"
            dest="bin/prebuilt/${platform}"
            mkdir -p "${dest}"
            cp -r "${artifact_dir}." "${dest}/"
            find "${dest}" -type f ! -name "*.exe" -exec chmod 755 {} \;
          done

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.14.0'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Validate prebuilt binaries
        run: npm run validate:prebuilt

      - name: Validate library
        run: node scripts/validate-library.js

      - name: Pack tarball for offline install
        shell: bash
        run: npm pack --json | tee .npm-pack.json

      - name: Validate packed tarball contents
        shell: bash
        run: node scripts/validate-packed-tarball.js --pack-json .npm-pack.json

      - name: Publish (dry-run)
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: npm publish --access public --provenance --dry-run

      - name: Publish
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: npm publish --access public --provenance

      - name: Create GitHub Release with offline tarball
        if: ${{ startsWith(github.ref, 'refs/tags/v') && github.event.inputs.dry_run != 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          files: colin4k1024-tsp-create-*.tgz
          generate_release_notes: true
